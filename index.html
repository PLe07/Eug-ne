<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Île des Savoirs — Révisions 6ᵉ d'Eugène</title>
<style>
  :root{
    --bleu:#2b6cff;--bleu2:#1746b0;--violet:#7b2ff7;--vert:#20c46b;--rouge:#ff4d5e;
    --or:#ffc93c;--texte:#1a2140;--gris:#8a93b2;--carte:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:inherit;}
  body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--texte);
    background:linear-gradient(160deg,#12224f,#3a1c86 55%,#7b2ff7);min-height:100vh;padding:14px;}
  #app{max-width:860px;margin:0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .logo{color:#fff;font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px;}
  .logo span{font-size:24px;}
  .infos{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .puce{background:rgba(255,255,255,.16);color:#fff;border-radius:99px;padding:6px 12px;font-weight:800;font-size:13px;display:flex;gap:5px;align-items:center;}
  .icobtn{background:rgba(255,255,255,.16);border:none;color:#fff;font-size:17px;width:40px;height:40px;border-radius:12px;cursor:pointer;transition:.15s;}
  .icobtn:hover{background:rgba(255,255,255,.32);transform:translateY(-1px);}
  .carte{background:var(--carte);border-radius:22px;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.28);}
  .ecran{animation:pop .32s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98);}to{opacity:1;transform:none;}}
  h1{font-size:25px;margin-bottom:6px;}h2{font-size:20px;margin-bottom:12px;}
  .sous{color:var(--gris);margin-bottom:18px;line-height:1.5;}
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .tuile{border:none;border-radius:18px;padding:20px 16px;cursor:pointer;color:#fff;text-align:left;
    font-size:17px;font-weight:800;transition:.15s;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;gap:6px;}
  .tuile:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(0,0,0,.25);}
  .tuile .emo{font-size:28px;}.tuile small{font-weight:600;opacity:.92;font-size:12px;}
  .t-aventure{background:linear-gradient(135deg,#2b6cff,#54c8ff);}
  .t-rush{background:linear-gradient(135deg,#ff4d5e,#ff8a5b);}
  .t-jour{background:linear-gradient(135deg,#20c46b,#7be495);}
  .t-boutique{background:linear-gradient(135deg,#ff8a00,#ffc93c);color:#3a2600;}
  .t-zen{background:linear-gradient(135deg,#7b2ff7,#c072ff);}
  .t-large{grid-column:1/-1;background:linear-gradient(135deg,#141b3d,#2b3a7a);}
  .btn{background:var(--bleu);color:#fff;border:none;border-radius:14px;padding:13px 20px;font-size:15px;font-weight:800;cursor:pointer;transition:.15s;}
  .btn:hover{background:var(--bleu2);transform:translateY(-2px);}
  .btn.ghost{background:#eef1fb;color:var(--texte);}.btn.ghost:hover{background:#e2e7f7;}
  .btn.large{width:100%;padding:15px;font-size:16px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}.centre{text-align:center;}
  .badge{display:inline-block;background:#eef1fb;color:var(--bleu2);border-radius:99px;padding:5px 12px;font-size:13px;font-weight:800;}

  /* Carte-monde */
  .iles{display:grid;gap:13px;}
  .ile{border-radius:18px;padding:16px 18px;color:#fff;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
  .ile:hover{transform:translateY(-2px);}
  .ile .ico{font-size:38px;}
  .ile .txt{flex:1;}
  .ile .nom{font-weight:800;font-size:18px;}
  .ile .prog{font-size:12px;opacity:.92;margin-top:2px;}
  .ile.verrou{filter:grayscale(.7) brightness(.8);cursor:not-allowed;}
  .ile .cadenas{font-size:26px;}
  .chemin{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px;}
  .noeud{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;border:3px solid #e7ebf7;background:#fff;color:var(--texte);cursor:pointer;position:relative;transition:.15s;}
  .noeud:hover{transform:scale(1.08);}
  .noeud.fait{background:var(--vert);color:#fff;border-color:var(--vert);}
  .noeud.actif{border-color:var(--or);box-shadow:0 0 0 4px rgba(255,201,60,.35);}
  .noeud.verrou{background:#eef1fb;color:#b9c0d6;cursor:not-allowed;border-color:#eef1fb;}
  .noeud .mini{position:absolute;bottom:-14px;font-size:10px;}
  .noeud.boss{background:linear-gradient(135deg,#ff4d5e,#7b2ff7);color:#fff;border:none;width:52px;height:52px;font-size:22px;}

  /* Quiz */
  .qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:var(--gris);font-weight:800;font-size:13px;}
  .barre{height:9px;background:#eef1fb;border-radius:99px;overflow:hidden;margin-bottom:14px;}
  .barre>i{display:block;height:100%;background:linear-gradient(90deg,var(--bleu),var(--violet));width:0;transition:width .3s;}
  .chrono{height:11px;background:#eef1fb;border-radius:99px;overflow:hidden;margin-bottom:14px;}
  .chrono>i{display:block;height:100%;background:linear-gradient(90deg,var(--or),var(--rouge));width:100%;}
  .question{font-size:20px;font-weight:800;line-height:1.4;margin:4px 0 16px;}
  .choix{display:grid;gap:11px;}
  .choix button{border:3px solid #e7ebf7;background:#fff;border-radius:14px;padding:15px;font-size:16px;text-align:left;cursor:pointer;transition:.12s;font-weight:600;color:var(--texte);}
  .choix button:hover:not(:disabled){border-color:var(--bleu);background:#f6f9ff;}
  .choix button.bon{border-color:var(--vert);background:#e9fbf1;color:#0d7a41;}
  .choix button.faux{border-color:var(--rouge);background:#ffecee;color:#b1263a;}
  .choix button.efface{opacity:.25;}
  .explication{margin-top:14px;padding:13px 15px;border-radius:14px;background:#f3f6ff;border-left:5px solid var(--bleu);font-size:15px;line-height:1.5;display:none;}
  .explication.bon{background:#e9fbf1;border-color:var(--vert);}.explication.faux{background:#fff3f0;border-color:var(--rouge);}
  .powers{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .power{background:#eef1fb;border:none;border-radius:12px;padding:8px 12px;font-weight:800;font-size:13px;cursor:pointer;transition:.15s;}
  .power:hover:not(:disabled){background:#e0e6fb;}.power:disabled{opacity:.4;cursor:not-allowed;}

  /* Combat / boss */
  .arene{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:6px;position:relative;}
  .combattant{flex:1;text-align:center;}
  .avatar{font-size:60px;line-height:1;display:inline-block;transition:transform .15s;}
  .avatar.hit{animation:sec .4s;}
  @keyframes sec{0%,100%{transform:none;}25%{transform:translateX(-9px) rotate(-6deg);}50%{transform:translateX(9px) rotate(6deg);}75%{transform:translateX(-5px);}}
  .nom{font-weight:800;margin-top:4px;font-size:14px;}
  .pv{height:15px;background:#e7ebf7;border-radius:99px;overflow:hidden;margin-top:6px;position:relative;}
  .pv>i{display:block;height:100%;border-radius:99px;transition:width .45s cubic-bezier(.4,1.3,.5,1);}
  .pv.hero>i{background:linear-gradient(90deg,#20c46b,#7be495);}
  .pv.enemi>i{background:linear-gradient(90deg,#ff4d5e,#ff8a5b);}
  .pv small{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0e1430;}
  .flottant{position:absolute;font-weight:900;font-size:22px;pointer-events:none;animation:monte 1s ease forwards;}
  @keyframes monte{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-42px);}}
  .msg{text-align:center;font-weight:800;font-size:15px;min-height:20px;margin:8px 0;}

  /* Boutique */
  .boutique{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;}
  .article{border:3px solid #eef1fb;border-radius:16px;padding:14px 8px;text-align:center;transition:.15s;}
  .article .emo{font-size:38px;}
  .article .titre{font-weight:800;font-size:13px;margin:4px 0;}
  .article .perk{font-size:11px;color:var(--gris);min-height:26px;}
  .article button{width:100%;margin-top:6px;border:none;border-radius:10px;padding:8px;font-weight:800;font-size:12px;cursor:pointer;background:var(--bleu);color:#fff;}
  .article button:disabled{background:#e2e7f7;color:#9aa4c0;cursor:not-allowed;}
  .article.actif{border-color:var(--vert);background:#eafbf1;}
  .section-titre{font-weight:800;font-size:15px;margin:18px 0 8px;color:var(--texte);}

  .gros-emo{font-size:66px;margin-bottom:6px;}
  .etoiles{font-size:32px;letter-spacing:5px;margin:8px 0;}
  .stat{font-size:38px;font-weight:900;color:var(--bleu);}
  .foot{color:rgba(255,255,255,.72);text-align:center;font-size:12px;margin-top:14px;line-height:1.5;}
  @media(max-width:560px){.menu{grid-template-columns:1fr;}.avatar{font-size:50px;}.question{font-size:18px;}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo"><span id="hdr-avatar">🦸</span> L'Île des Savoirs</div>
    <div class="infos" id="hdr-infos"></div>
    <div class="row">
      <button class="icobtn" id="btn-son" title="Son">🔊</button>
      <button class="icobtn" id="btn-menu" title="Menu">🏠</button>
    </div>
  </div>
  <div class="carte" id="scene"></div>
  <div class="foot">Fait pour Eugène 💪 — Programme de 6ᵉ et primaire · Maths · Français · Sciences · Histoire-Géo · Anglais<br>
  Astuce combat : réponds <b>juste</b> et <b>vite</b> pour frapper avant l'ennemi !</div>
</div>

<script>
/* =====================================================================
   L'ÎLE DES SAVOIRS — jeu de révision 6ᵉ (un seul fichier, GitHub Pages)
   ===================================================================== */

/* ---------- BANQUE DE QUESTIONS ----------
   {q, choix:[4], bonne (texte exact d'un choix), niveau 1|2|3, exp} */
const QUESTIONS = {
  maths: [
    {q:"Combien font 7 × 8 ?",choix:["56","54","48","64"],bonne:"56",niveau:1,exp:"Table de 8 : 7×8 = 56."},
    {q:"Combien font 9 × 6 ?",choix:["54","56","45","63"],bonne:"54",niveau:1,exp:"9×6 = 54."},
    {q:"Combien font 6 × 7 ?",choix:["42","48","36","49"],bonne:"42",niveau:1,exp:"6×7 = 42."},
    {q:"Combien font 8 × 8 ?",choix:["64","56","72","48"],bonne:"64",niveau:1,exp:"Le carré de 8 : 8×8 = 64."},
    {q:"Combien font 11 × 11 ?",choix:["121","111","120","132"],bonne:"121",niveau:2,exp:"11×11 = 121."},
    {q:"Combien font 45 + 38 ?",choix:["83","73","85","93"],bonne:"83",niveau:1,exp:"45+38 = 83."},
    {q:"Combien font 100 − 37 ?",choix:["63","67","73","57"],bonne:"63",niveau:1,exp:"100−37 = 63."},
    {q:"Combien font 144 ÷ 12 ?",choix:["12","14","11","24"],bonne:"12",niveau:2,exp:"12×12 = 144, donc 144÷12 = 12."},
    {q:"Combien font 56 ÷ 7 ?",choix:["8","7","9","6"],bonne:"8",niveau:1,exp:"7×8 = 56, donc 56÷7 = 8."},
    {q:"Quel est le double de 25 ?",choix:["50","45","52","30"],bonne:"50",niveau:1,exp:"Le double = ×2 : 25×2 = 50."},
    {q:"Quelle est la moitié de 50 ?",choix:["25","20","30","15"],bonne:"25",niveau:1,exp:"La moitié = ÷2 : 50÷2 = 25."},
    {q:"Quel est le triple de 20 ?",choix:["60","40","50","23"],bonne:"60",niveau:1,exp:"Le triple = ×3 : 20×3 = 60."},
    {q:"Combien de dizaines dans 340 ?",choix:["34","3","40","304"],bonne:"34",niveau:2,exp:"340 = 34 dizaines (34×10)."},
    {q:"Dans 4 572, quel est le chiffre des centaines ?",choix:["5","4","7","2"],bonne:"5",niveau:2,exp:"4(mille) 5(centaines) 7(dizaines) 2(unités)."},
    {q:"Arrondir 47 à la dizaine la plus proche :",choix:["50","40","47","45"],bonne:"50",niveau:2,exp:"47 est plus proche de 50 que de 40."},
    {q:"Combien font 3×100 + 5×10 + 2 ?",choix:["352","3502","35 2","30052"],bonne:"352",niveau:2,exp:"300 + 50 + 2 = 352."},
    {q:"Combien font 1/2 + 1/2 ?",choix:["1","1/4","2/2 seulement","1/1"],bonne:"1",niveau:1,exp:"Deux moitiés font un entier : 1/2 + 1/2 = 1."},
    {q:"Combien font 1/4 + 1/4 ?",choix:["1/2","2/4 seulement","1/8","1/4"],bonne:"1/2",niveau:2,exp:"1/4 + 1/4 = 2/4 = 1/2."},
    {q:"La fraction 3/4 correspond à quel pourcentage ?",choix:["75 %","34 %","50 %","25 %"],bonne:"75 %",niveau:2,exp:"3/4 = 75/100 = 75 %."},
    {q:"Le nombre 0,5 correspond à quelle fraction ?",choix:["1/2","1/5","5/10 seulement","1/4"],bonne:"1/2",niveau:2,exp:"0,5 = 5/10 = 1/2."},
    {q:"Combien font 2,5 + 2,5 ?",choix:["5","4,10","5,5","4,5"],bonne:"5",niveau:1,exp:"2,5 + 2,5 = 5."},
    {q:"Combien font 0,1 + 0,9 ?",choix:["1","0,10","0,91","0,19"],bonne:"1",niveau:2,exp:"0,1 + 0,9 = 1,0 = 1."},
    {q:"Combien vaut 1/10 en écriture décimale ?",choix:["0,1","0,01","1,0","10"],bonne:"0,1",niveau:2,exp:"1/10 = 0,1 (un dixième)."},
    {q:"Combien font les 3/4 de 100 ?",choix:["75","34","300","25"],bonne:"75",niveau:2,exp:"100÷4 = 25, puis 25×3 = 75."},
    {q:"Combien font 2 + 3 × 4 ?",choix:["14","20","24","9"],bonne:"14",niveau:2,exp:"On multiplie d'abord : 3×4=12, puis 2+12 = 14."},
    {q:"Combien font (2 + 3) × 4 ?",choix:["20","14","24","9"],bonne:"20",niveau:2,exp:"Les parenthèses d'abord : 2+3=5, puis 5×4 = 20."},
    {q:"Combien font 10 − 2 × 3 ?",choix:["4","24","8","6"],bonne:"4",niveau:3,exp:"Multiplication d'abord : 2×3=6, puis 10−6 = 4."},
    {q:"Combien font 50 % de 60 ?",choix:["30","50","25","60"],bonne:"30",niveau:1,exp:"50 % = la moitié : 60÷2 = 30."},
    {q:"Combien font 10 % de 200 ?",choix:["20","10","2","100"],bonne:"20",niveau:2,exp:"10 % = ÷10 : 200÷10 = 20."},
    {q:"Combien font 25 % de 40 ?",choix:["10","25","20","4"],bonne:"10",niveau:2,exp:"25 % = 1/4 : 40÷4 = 10."},
    {q:"Un stylo coûte 2 €. Combien coûtent 5 stylos ?",choix:["10 €","7 €","12 €","25 €"],bonne:"10 €",niveau:1,exp:"2 € × 5 = 10 € (proportionnalité)."},
    {q:"3 pommes coûtent 6 €. Combien coûte 1 pomme ?",choix:["2 €","3 €","6 €","1 €"],bonne:"2 €",niveau:2,exp:"6 € ÷ 3 = 2 € la pomme."},
    {q:"La somme des angles d'un triangle vaut :",choix:["180°","90°","360°","270°"],bonne:"180°",niveau:2,exp:"Dans tout triangle, la somme des 3 angles = 180°."},
    {q:"Combien de côtés a un carré ?",choix:["4","3","5","6"],bonne:"4",niveau:1,exp:"Le carré a 4 côtés égaux."},

    {q:"Aire d'un carré de côté 4 :",choix:["16","8","12","20"],bonne:"16",niveau:2,exp:"Aire = côté × côté = 4×4 = 16."},
    {q:"Périmètre d'un rectangle L=6, l=4 :",choix:["20","24","10","12"],bonne:"20",niveau:2,exp:"Périmètre = 2×(L+l) = 2×(6+4) = 20."},
    {q:"Aire d'un rectangle L=6, l=4 :",choix:["24","20","10","12"],bonne:"24",niveau:2,exp:"Aire = L×l = 6×4 = 24."},
    {q:"Un angle droit mesure :",choix:["90°","180°","45°","360°"],bonne:"90°",niveau:1,exp:"L'angle droit (le coin d'une équerre) mesure 90°."},
    {q:"Un angle plat mesure :",choix:["180°","90°","360°","120°"],bonne:"180°",niveau:2,exp:"L'angle plat forme une ligne droite : 180°."},
    {q:"Combien de côtés a un hexagone ?",choix:["6","5","8","7"],bonne:"6",niveau:2,exp:"Hexa = six : l'hexagone a 6 côtés."},
    {q:"Combien de faces a un cube ?",choix:["6","8","12","4"],bonne:"6",niveau:2,exp:"Le cube a 6 faces carrées."},

    {q:"Le rayon d'un cercle est la moitié du…",choix:["diamètre","périmètre","rayon","centre"],bonne:"diamètre",niveau:2,exp:"Le diamètre = 2 × rayon, donc le rayon = diamètre ÷ 2."},
    {q:"Un triangle équilatéral a combien de côtés égaux ?",choix:["3","2","4","0"],bonne:"3",niveau:2,exp:"Équilatéral = ses 3 côtés ont la même longueur."},
    {q:"1 mètre = combien de centimètres ?",choix:["100","10","1000","50"],bonne:"100",niveau:1,exp:"1 m = 100 cm."},
    {q:"1 kilomètre = combien de mètres ?",choix:["1000","100","10","500"],bonne:"1000",niveau:1,exp:"1 km = 1000 m."},
    {q:"1 kilogramme = combien de grammes ?",choix:["1000","100","10","500"],bonne:"1000",niveau:1,exp:"1 kg = 1000 g."},
    {q:"1 litre = combien de millilitres ?",choix:["1000","100","10","500"],bonne:"1000",niveau:2,exp:"1 L = 1000 mL."},
    {q:"1 heure = combien de minutes ?",choix:["60","100","30","24"],bonne:"60",niveau:1,exp:"1 h = 60 min."},
    {q:"2 heures = combien de minutes ?",choix:["120","60","100","200"],bonne:"120",niveau:2,exp:"2 × 60 = 120 minutes."},
    {q:"Une demi-heure, c'est combien de minutes ?",choix:["30","15","45","60"],bonne:"30",niveau:1,exp:"La moitié de 60 min = 30 min."},
    {q:"500 g, c'est quelle part d'un kilogramme ?",choix:["0,5 kg","5 kg","0,05 kg","2 kg"],bonne:"0,5 kg",niveau:2,exp:"500 g = la moitié de 1000 g = 0,5 kg."},
    {q:"1,5 m, c'est combien de centimètres ?",choix:["150","15","1500","105"],bonne:"150",niveau:2,exp:"1 m = 100 cm, donc 1,5 m = 150 cm."},
    {q:"Il fait −2 °C, puis la température monte de 5 °C. Il fait :",choix:["3 °C","−7 °C","7 °C","−3 °C"],bonne:"3 °C",niveau:3,exp:"−2 + 5 = 3 °C."},
    {q:"Quel nombre est le plus grand : −5 ou −2 ?",choix:["−2","−5","ils sont égaux","0"],bonne:"−2",niveau:3,exp:"Sur la droite des nombres, −2 est plus proche de 0, donc plus grand."},
    {q:"Parmi 3, 7, 8, 9, quel est le nombre pair ?",choix:["8","3","7","9"],bonne:"8",niveau:1,exp:"Un nombre pair se termine par 0,2,4,6,8. Ici : 8."},

    {q:"Combien font 3/3 ?",choix:["1","3","0","1/3"],bonne:"1",niveau:2,exp:"Une fraction dont le haut = le bas vaut 1."},

    {q:"Combien font 12 ÷ 0,5 ?",choix:["24","6","2","0,6"],bonne:"24",niveau:3,exp:"Diviser par 0,5, c'est multiplier par 2 : 12×2 = 24."},
    {q:"Combien de minutes dans un quart d'heure ?",choix:["15","30","20","45"],bonne:"15",niveau:1,exp:"Un quart d'heure = 60÷4 = 15 min."},
    {q:"Combien font 1000 − 1 ?",choix:["999","990","1001","909"],bonne:"999",niveau:1,exp:"1000 − 1 = 999."}
  ],

let jeu=null;
function jouerPalier(idx,p){
  const ile=ILES[idx];

function questionJeu(){

    </div>`}
    <div class="question">${esc(q.q)}</div>
    <div class="choix" id="choix"></div>

  choix.forEach(c=>{const b=document.createElement('button');b.textContent=c;b.onclick=()=>repondreJeu(b,c);cont.appendChild(b);});

    $('#p-c50').onclick=()=>usePower('c50');
    $('#p-temps').onclick=()=>usePower('temps');
    $('#p-indice').onclick=()=>usePower('indice');
    lancerChrono(jeu.temps);
  }
}
function lancerChrono(sec){
  stopChrono();const bar=$('#chrono-bar');if(!bar)return;
  jeu.chronoBonus=0;const t0=performance.now();
  const boucle=now=>{const dt=(now-t0)/1000 - (jeu.chronoBonus||0);const reste=Math.max(0,1-dt/sec);bar.style.width=(reste*100)+'%';if(dt>=sec){chronoId=null;tempsEcouleJeu();return;}chronoId=requestAnimationFrame(boucle);};
  chronoId=requestAnimationFrame(boucle);
}
function usePower(cle){
  if(jeu.repondu||S.power[cle]<=0)return;
  S.power[cle]--;save();
  const boutons=[...document.querySelectorAll('#choix button')];
  if(cle==='c50'||cle==='indice'){
    const mauvais=boutons.filter(b=>b.textContent!==jeu.q.bonne && !b.classList.contains('efface'));
    const aEffacer=melange(mauvais).slice(0,cle==='c50'?2:1);
    aEffacer.forEach(b=>{b.classList.add('efface');b.disabled=true;});
  }else if(cle==='temps'){ jeu.chronoBonus=(jeu.chronoBonus||0)+8; }
  const btn=$('#p-'+cle); if(btn){btn.textContent=btn.textContent.replace(/\(\d+\)/,'('+S.power[cle]+')'); if(S.power[cle]<=0)btn.disabled=true;}
}
function tempsEcouleJeu(){ if(jeu.repondu)return; jeu.repondu=true; revele(null); sfx.faux(); avancerJeu(false,'⏰ Temps écoulé !'); }
function repondreJeu(btn,c){
  if(jeu.repondu)return; jeu.repondu=true; stopChrono();
  const bon=(c===jeu.q.bonne);
  revele(bon?null:btn);
  if(bon){jeu.bonnes++;sfx.bon();} else sfx.faux();
  avancerJeu(bon);
}
function revele(btnFaux){
  document.querySelectorAll('#choix button').forEach(b=>{b.disabled=true;if(b.textContent===jeu.q.bonne)b.classList.add('bon');});
  if(btnFaux)btnFaux.classList.add('faux');
  const exp=$('#exp');exp.style.display='block';
  const bon=!btnFaux && document.querySelector('#choix button.faux')===null && jeu.repondu;
}
function avancerJeu(bon,forceMsg){
  const exp=$('#exp');
  if(bon){exp.className='explication bon';exp.innerHTML=`✅ <b>Bravo !</b> ${esc(jeu.q.exp)}`;}
  else{exp.className='explication faux';exp.innerHTML=`${forceMsg?esc(forceMsg)+' ':''}❌ Bonne réponse : <b>${esc(jeu.q.bonne)}</b>. ${esc(jeu.q.exp)}`;}
  const suite=$('#suite');const b=document.createElement('button');b.className='btn large';
  b.textContent=jeu.i===jeu.liste.length-1?'Terminer 🏁':'Suivant →';
  b.onclick=()=>{jeu.i++;questionJeu();};
  suite.appendChild(b);
}
function finJeu(){
  stopChrono();
  const n=jeu.liste.length, bonnes=jeu.bonnes, ratio=bonnes/n;
  if(jeu.type==='zen') return finZen(bonnes,n);
  // palier
  const etoiles = bonnes===n?3 : bonnes>=Math.ceil(n*0.8)?2 : bonnes>=Math.ceil(n*0.6)?1:0;
  const reussi = bonnes>=3;
  const st=S.iles[jeu.ile.id];
  let pieces=0,xp=0;
  if(reussi){
    if(jeu.p===st.palier){ st.palier++; }
    if(!st.etoiles[jeu.p] || etoiles>st.etoiles[jeu.p]) st.etoiles[jeu.p]=etoiles;
    pieces=gagnerPieces(bonnes*8+etoiles*10); xp=bonnes*12+etoiles*15; S.xp+=xp;
    S.rating+=10+etoiles*8;
    if(st.palier>=1) badge('p1','Premier palier franchi !');
  } else { S.rating=Math.max(100,S.rating-8); }
  save();
  (reussi?sfx.win:sfx.lose)();
  scene().className='carte ecran centre';
  scene().innerHTML=`
    <div class="gros-emo">${etoiles===3?'🏆':reussi?'🎉':'💪'}</div>
    <h2>${reussi?'Palier réussi !':'Presque ! Réessaie'}</h2>
    <div class="etoiles">${'⭐'.repeat(etoiles)}${'▫️'.repeat(3-etoiles)}</div>
    <div class="stat">${bonnes} / ${n}</div>
    <p class="sous">${reussi?`+${pieces} 🪙 · +${xp} XP`:'Il faut au moins 3 bonnes réponses pour valider.'}</p>
    <div class="row" style="justify-content:center">
      <button class="btn" id="rej">🔁 Rejouer</button>
      <button class="btn ghost" id="carte2">🗺️ Île</button>
    </div>`;
  $('#rej').onclick=()=>jouerPalier(jeu.idx,jeu.p);
  $('#carte2').onclick=()=>ileVue(jeu.idx);
}
function finZen(bonnes,n){
  S.xp+=bonnes*6; const pieces=gagnerPieces(bonnes*4); save();
  (bonnes>=n*0.6?sfx.win:sfx.faux)();
  scene().className='carte ecran centre';
  scene().innerHTML=`
    <div class="gros-emo">🧘</div><h2>Séance terminée !</h2>
    <div class="stat">${bonnes} / ${n}</div>
    <p class="sous">+${pieces} 🪙 · bravo d'avoir révisé 💪</p>
    <div class="row" style="justify-content:center">
      <button class="btn" id="rej">🔁 Encore</button>
      <button class="btn ghost" id="men">🏠 Menu</button>
    </div>`;
  $('#rej').onclick=()=>zenJouer(jeu.mat);
  $('#men').onclick=menu;
}

/* =====================================================================
   BOSS (combat)
   ===================================================================== */
let combat=null;
function bossFight(idx){
  const ile=ILES[idx];
  combat={idx,ile,boss:ile.boss,heroMax:100,hero:100,ennemi:ile.boss.pv,ennemiMax:ile.boss.pv,bonnes:0,total:0,repondu:false};
  dessinerBoss(`${ile.boss.nom} surgit ! Réponds vite et juste !`);
  setTimeout(roundBoss,600);
}
function dessinerBoss(msg){
  const b=combat.boss;
  scene().className='carte ecran';
  scene().innerHTML=`
    <div class="row" style="justify-content:space-between;align-items:center"><h2 style="margin:0">👑 Boss — ${combat.ile.nom}</h2><button class="btn ghost" id="fuir">← Fuir</button></div>
    <div class="arene" style="margin-top:10px">
      <div class="combattant"><div class="avatar" id="av-hero">${S.skin}</div><div class="nom">Eugène ${S.pet||''}</div><div class="pv hero"><i id="pv-hero" style="width:100%"></i><small id="pt-hero"></small></div></div>
      <div style="font-size:24px;padding-bottom:24px">⚔️</div>
      <div class="combattant"><div class="avatar" id="av-enemi">${b.emo}</div><div class="nom">${esc(b.nom)}</div><div class="pv enemi"><i id="pv-enemi" style="width:100%"></i><small id="pt-enemi"></small></div></div>
    </div>
    <div class="msg" id="msg">${esc(msg||'')}</div>
    <div class="chrono"><i id="chrono-bar"></i></div>
    <div class="question" id="q-boss">…</div>
    <div class="choix" id="choix-boss"></div>`;
  $('#fuir').onclick=()=>ileVue(combat.idx);
  majPv();
}
function majPv(){const h=Math.max(0,combat.hero),e=Math.max(0,combat.ennemi);$('#pv-hero').style.width=(h/combat.heroMax*100)+'%';$('#pv-enemi').style.width=(e/combat.ennemiMax*100)+'%';$('#pt-hero').textContent=h+' PV';$('#pt-enemi').textContent=e+' PV';}
function roundBoss(){
  if(!combat)return;
  const q=piocher(combat.ile.id,1,3)[0];combat.q=q;combat.repondu=false;combat.t0=performance.now();
  const choix=melange(q.choix);const m=$('#msg');if(m)m.textContent='';
  $('#q-boss').innerHTML=esc(q.q);
  const cont=$('#choix-boss');cont.innerHTML='';
  choix.forEach(c=>{const b=document.createElement('button');b.textContent=c;b.onclick=()=>repBoss(b,c);cont.appendChild(b);});
  lancerChronoBoss(14);
}
function lancerChronoBoss(sec){stopChrono();const bar=$('#chrono-bar');if(!bar)return;const t0=performance.now();const boucle=now=>{const dt=(now-t0)/1000;bar.style.width=Math.max(0,1-dt/sec)*100+'%';if(dt>=sec){chronoId=null;tempsBoss();return;}chronoId=requestAnimationFrame(boucle);};chronoId=requestAnimationFrame(boucle);}
function verrouBoss(btnFaux){document.querySelectorAll('#choix-boss button').forEach(b=>{b.disabled=true;if(b.textContent===combat.q.bonne)b.classList.add('bon');});if(btnFaux)btnFaux.classList.add('faux');}
function flott(cible,txt,coul){const host=document.querySelector('.arene');if(!host||!cible)return;const el=document.createElement('div');el.className='flottant';el.textContent=txt;el.style.color=coul;const bb=cible.getBoundingClientRect(),hb=host.getBoundingClientRect();el.style.left=(bb.left-hb.left+bb.width/2-12)+'px';el.style.top=(bb.top-hb.top-8)+'px';host.appendChild(el);setTimeout(()=>el.remove(),1000);}
function heroFrappe(d,msg){sfx.coup();combat.ennemi=Math.max(0,combat.ennemi-d);const a=$('#av-enemi');if(a){a.classList.add('hit');setTimeout(()=>a.classList.remove('hit'),400);flott(a,'-'+d,'#ff3b30');}majPv();const m=$('#msg');if(m)m.innerHTML=esc(msg);}
function ennemiFrappe(msg){sfx.coup();combat.hero=Math.max(0,combat.hero-combat.boss.degats);const a=$('#av-hero');if(a){a.classList.add('hit');setTimeout(()=>a.classList.remove('hit'),400);flott(a,'-'+combat.boss.degats,'#ff3b30');}majPv();if(msg){const m=$('#msg');if(m)m.innerHTML=esc(msg);}}
function repBoss(btn,c){
  if(!combat||combat.repondu)return;combat.repondu=true;stopChrono();combat.total++;
  const dt=(performance.now()-combat.t0)/1000, bon=(c===combat.q.bonne);
  verrouBoss(bon?null:btn);
  if(bon){combat.bonnes++;const rapide=dt<7;if(rapide){const d=20+Math.round(Math.min(4,7-dt))*2;heroFrappe(d,`💥 Coup critique ! -${d} PV`);}else{heroFrappe(14,'✅ Juste, mais lent : échange !');setTimeout(()=>ennemiFrappe(''),350);}}
  else{sfx.faux();ennemiFrappe(`❌ Raté ! C'était « ${combat.q.bonne} ». ${combat.boss.nom} frappe !`);}
  finRoundBoss();
}
function tempsBoss(){if(!combat||combat.repondu)return;combat.repondu=true;combat.total++;verrouBoss(null);ennemiFrappe('⏰ Trop lent !');finRoundBoss();}
function finRoundBoss(){
  setTimeout(()=>{
    if(!combat)return;
    if(combat.hero<=0)return bossPerdu();
    if(combat.ennemi<=0)return bossGagne();
    roundBoss();
  },1300);
}
function bossGagne(){
  stopChrono();sfx.win();
  const st=S.iles[combat.idx!=null?ILES[combat.idx].id:combat.ile.id];
  const premiere=!st.boss; st.boss=true;
  const pieces=gagnerPieces(premiere?150:60); S.xp+=120; S.rating+=45; save();
  badge('boss1','Premier boss vaincu !');
  if(ILES.every(i=>S.iles[i.id].boss)) badge('champ','CHAMPION de toutes les îles !');
  scene().className='carte ecran centre';
  scene().innerHTML=`
    <div class="gros-emo">🏆</div><h2>${combat.boss.nom} est vaincu !</h2>
    <p class="sous">${premiere?`Nouvelle île débloquée ! `:''}+${pieces} 🪙 · +120 XP</p>
    <div class="etoiles">⭐⭐⭐</div>
    <p class="sous">${combat.bonnes}/${combat.total} bonnes réponses</p>
    <div class="row" style="justify-content:center"><button class="btn" id="carte2">🗺️ Carte</button><button class="btn ghost" id="men">🏠 Menu</button></div>`;
  $('#carte2').onclick=carte;$('#men').onclick=menu;
}
function bossPerdu(){
  stopChrono();sfx.lose();S.rating=Math.max(100,S.rating-12);save();
  scene().className='carte ecran centre';
  scene().innerHTML=`
    <div class="gros-emo">💥</div><h2>${combat.boss.nom} t'a battu…</h2>
    <p class="sous">Réentraîne-toi et reviens plus fort ! 💪</p>
    <p class="sous">${combat.bonnes}/${combat.total} bonnes réponses</p>
    <div class="row" style="justify-content:center"><button class="btn" id="rej">🔁 Réessayer</button><button class="btn ghost" id="carte2">🗺️ Île</button></div>`;
  $('#rej').onclick=()=>bossFight(combat.idx);$('#carte2').onclick=()=>ileVue(combat.idx);
}

/* =====================================================================
   DÉFI ÉCLAIR (puzzle rush)
   ===================================================================== */
let rush=null;
function rushIntro(){
  scene().className='carte ecran centre';
  scene().innerHTML=`
    <div class="gros-emo">⚡</div><h2>Défi Éclair</h2>
    <p class="sous">Enchaîne un maximum de bonnes réponses ! <b>3 erreurs = fin.</b> Toutes les matières, de plus en plus dur.<br>🏆 Ton record : <b>${S.rush||0}</b></p>
    <div class="row" style="justify-content:center"><button class="btn large" id="go" style="max-width:260px">🚀 Commencer</button></div>
    <div style="margin-top:10px"><button class="btn ghost" id="men">← Menu</button></div>`;
  $('#go').onclick=rushStart;$('#men').onclick=menu;
}
function rushStart(){rush={score:0,vies:3,repondu:false};rushRound();}
function rushRound(){
  stopChrono();
  const nivMax=rush.score<5?1:rush.score<12?2:3;
  const q=piocher('mix',1,nivMax)[0];rush.q=q;rush.repondu=false;
  const choix=melange(q.choix);
  scene().className='carte ecran';
  scene().innerHTML=`
    <div class="qtop"><span>⚡ Défi Éclair</span><span>❤️ ${'❤️'.repeat(rush.vies)}${'🖤'.repeat(3-rush.vies)}</span></div>
    <div class="stat centre">${rush.score}</div>
    <p class="sous centre" style="margin:4px 0 14px">${NOMS_MAT[q.mat]}</p>
    <div class="chrono"><i id="chrono-bar"></i></div>
    <div class="question">${esc(q.q)}</div>
    <div class="choix" id="choix"></div>`;
  const cont=$('#choix');choix.forEach(c=>{const b=document.createElement('button');b.textContent=c;b.onclick=()=>rushRep(b,c);cont.appendChild(b);});
  lancerChronoRush(13);
}
function lancerChronoRush(sec){stopChrono();const bar=$('#chrono-bar');if(!bar)return;const t0=performance.now();const boucle=now=>{const dt=(now-t0)/1000;bar.style.width=Math.max(0,1-dt/sec)*100+'%';if(dt>=sec){chronoId=null;rushRep(null,null);return;}chronoId=requestAnimationFrame(boucle);};chronoId=requestAnimationFrame(boucle);}
function rushRep(btn,c){
  if(rush.repondu)return;rush.repondu=true;stopChrono();
  document.querySelectorAll('#choix button').forEach(b=>{b.disabled=true;if(b.textContent===rush.q.bonne)b.classList.add('bon');});
  const bon=(c===rush.q.bonne);
  if(bon){rush.score++;sfx.bon();gagnerPieces(2);setTimeout(rushRound,550);}
  else{rush.vies--;sfx.faux();if(btn)btn.classList.add('faux');if(rush.vies<=0){setTimeout(rushFin,900);}else{setTimeout(rushRound,1100);}}
}
function rushFin(){
  stopChrono();const record=rush.score>(S.rush||0);if(record)S.rush=rush.score;
  S.xp+=rush.score*5;S.rating+=Math.floor(rush.score*1.5);
  if(rush.score>=15)badge('rush15','Défi Éclair : 15 d\'affilée !');
  save();(rush.score>=10?sfx.win:sfx.lose)();
  scene().className='carte ecran centre';
  scene().innerHTML=`
    <div class="gros-emo">${record?'🏆':'⚡'}</div><h2>${record?'Nouveau record !':'Défi terminé'}</h2>
    <div class="stat">${rush.score}</div>
    <p class="sous">bonnes réponses ${record?'':' · record : '+(S.rush||0)}</p>
    <div class="row" style="justify-content:center"><button class="btn" id="rej">🔁 Rejouer</button><button class="btn ghost" id="men">🏠 Menu</button></div>`;
  $('#rej').onclick=rushStart;$('#men').onclick=menu;
}

/* =====================================================================
   DÉFI DU JOUR
   ===================================================================== */
function aujourdhui(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function rngSeed(seed){let s=seed%2147483647;if(s<=0)s+=2147483646;return()=>((s=s*16807%2147483647)-1)/2147483646;}
function daily(){
  if(S.dailyDate===aujourdhui()){
    scene().className='carte ecran centre';
    scene().innerHTML=`<div class="gros-emo">📅</div><h2>Défi du jour déjà fait ✅</h2><p class="sous">Reviens demain pour continuer ta série ! 🔥 Série actuelle : <b>${S.streak}</b> jour(s).</p><button class="btn" id="men">🏠 Menu</button>`;
    $('#men').onclick=menu;return;
  }
  const d=new Date();const rnd=rngSeed(d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate());
  const all=toutes();const liste=[];const used={};
  while(liste.length<5){const k=Math.floor(rnd()*all.length);if(!used[k]){used[k]=1;liste.push(all[k]);}}
  jeuDaily={liste,i:0,bonnes:0};questionDaily();
}
let jeuDaily=null;
function questionDaily(){
  if(jeuDaily.i>=jeuDaily.liste.length)return finDaily();
  const q=jeuDaily.liste[jeuDaily.i],choix=melange(q.choix);jeuDaily.q=q;
  scene().className='carte ecran';
  scene().innerHTML=`
    <div class="barre"><i style="width:${jeuDaily.i/5*100}%"></i></div>
    <div class="qtop"><span>📅 Défi du jour · Q${jeuDaily.i+1}/5</span><span>${NOMS_MAT[q.mat]}</span></div>
    <div class="question">${esc(q.q)}</div>
    <div class="choix" id="choix"></div><div class="explication" id="exp"></div><div id="suite" style="margin-top:14px"></div>`;
  const cont=$('#choix');choix.forEach(c=>{const b=document.createElement('button');b.textContent=c;b.onclick=()=>{
    if(jeuDaily.rep)return;jeuDaily.rep=true;
    document.querySelectorAll('#choix button').forEach(x=>{x.disabled=true;if(x.textContent===q.bonne)x.classList.add('bon');});
    const bon=c===q.bonne;if(bon){jeuDaily.bonnes++;sfx.bon();}else{b.classList.add('faux');sfx.faux();}
    const exp=$('#exp');exp.style.display='block';exp.className='explication '+(bon?'bon':'faux');
    exp.innerHTML=bon?`✅ <b>Bravo !</b> ${esc(q.exp)}`:`❌ Réponse : <b>${esc(q.bonne)}</b>. ${esc(q.exp)}`;
    const s=$('#suite');const nb=document.createElement('button');nb.className='btn large';nb.textContent=jeuDaily.i===4?'Terminer 🏁':'Suivant →';nb.onclick=()=>{jeuDaily.rep=false;jeuDaily.i++;questionDaily();};s.appendChild(nb);
  };cont.appendChild(b);});
}
function finDaily(){
  const hier=new Date(Date.now()-86400000);const hierStr=hier.getFullYear()+'-'+(hier.getMonth()+1)+'-'+hier.getDate();
  S.streak=(S.dailyDate===hierStr)?S.streak+1:1;S.dailyDate=aujourdhui();
  const pieces=gagnerPieces(60+jeuDaily.bonnes*6);S.xp+=jeuDaily.bonnes*10;save();sfx.win();
  scene().className='carte ecran centre';
  scene().innerHTML=`<div class="gros-emo">📅</div><h2>Défi du jour terminé !</h2><div class="stat">${jeuDaily.bonnes}/5</div>
    <p class="sous">+${pieces} 🪙 · 🔥 Série : <b>${S.streak}</b> jour(s)</p>
    <button class="btn" id="men">🏠 Menu</button>`;
  $('#men').onclick=menu;
}

/* =====================================================================
   ZEN (choix matière)
   ===================================================================== */
function zenChoix(){
  scene().className='carte ecran';
  let html=`<div class="row" style="justify-content:space-between;align-items:center"><h2 style="margin:0">🧘 Entraînement zen</h2><button class="btn ghost" id="ret">← Menu</button></div>
    <p class="sous" style="margin-top:10px">Pas de chrono, pas de stress : 10 questions avec les explications. Choisis ta matière.</p><div class="menu">`;
  Object.keys(NOMS_MAT).forEach(k=>{const ile=ILES.find(i=>i.id===k);html+=`<button class="tuile" style="background:${ile.coul};${k==='histgeo'?'color:#3a2600':'color:#fff'}" data-m="${k}"><span class="emo">${ile.emo}</span> ${NOMS_MAT[k]} <small>${QUESTIONS[k].length} questions</small></button>`;});
  html+=`<button class="tuile t-large" data-m="mix"><span class="emo">🎲</span> Mélange surprise <small>toutes matières</small></button></div>`;
  scene().innerHTML=html;
  $('#ret').onclick=menu;
  document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>zenJouer(b.dataset.m));
}

/* =====================================================================
   BOUTIQUE
   ===================================================================== */
function boutique(){
  majEntete();
  scene().className='carte ecran';
  let html=`<div class="row" style="justify-content:space-between;align-items:center"><h2 style="margin:0">🛍️ Boutique</h2><button class="btn ghost" id="ret">← Menu</button></div>
    <p class="sous" style="margin-top:8px">Tu as <b>${S.coins} 🪙</b>. Gagne des pièces en jouant !</p>
    <div class="section-titre">🦸 Skins (héros)</div><div class="boutique" id="b-skins"></div>
    <div class="section-titre">🐾 Mascottes (bonus pièces)</div><div class="boutique" id="b-pets"></div>
    <div class="section-titre">✨ Power-ups</div><div class="boutique" id="b-packs"></div>`;
  scene().innerHTML=html;
  $('#ret').onclick=menu;
  const gs=$('#b-skins');
  SKINS.forEach(sk=>{
    const poss=S.skins.includes(sk.e), actif=S.skin===sk.e;
    const el=document.createElement('div');el.className='article'+(actif?' actif':'');
    el.innerHTML=`<div class="emo">${sk.e}</div><div class="perk">${sk.p===0?'offert':sk.p+' 🪙'}</div>
      <button ${actif?'disabled':''}>${actif?'✔ équipé':poss?'Équiper':(S.coins>=sk.p?'Acheter':'🔒')}</button>`;
    el.querySelector('button').onclick=()=>{
      if(poss){S.skin=sk.e;} else if(S.coins>=sk.p){S.coins-=sk.p;S.skins.push(sk.e);S.skin=sk.e;sfx.piece();}
      save();boutique();};
    gs.appendChild(el);
  });
  const gp=$('#b-pets');
  PETS.forEach(pt=>{
    const poss=S.pets.includes(pt.e), actif=S.pet===pt.e;
    const el=document.createElement('div');el.className='article'+(actif?' actif':'');
    el.innerHTML=`<div class="emo">${pt.e}</div><div class="titre">${pt.nom}</div><div class="perk">${pt.perk}</div>
      <button ${actif?'disabled':''}>${actif?'✔ actif':poss?'Activer':(S.coins>=pt.p?pt.p+' 🪙':'🔒 '+pt.p)}</button>`;
    el.querySelector('button').onclick=()=>{
      if(poss){S.pet=pt.e;} else if(S.coins>=pt.p){S.coins-=pt.p;S.pets.push(pt.e);S.pet=pt.e;sfx.piece();}
      save();boutique();};
    gp.appendChild(el);
  });
  const gk=$('#b-packs');
  PACKS.forEach(pk=>{
    const el=document.createElement('div');el.className='article';
    el.innerHTML=`<div class="emo">${pk.emo}</div><div class="titre">${pk.nom}</div><div class="perk">+${pk.n} · possède ${S.power[pk.cle]}</div>
      <button ${S.coins>=pk.p?'':'disabled'}>${pk.p} 🪙</button>`;
    el.querySelector('button').onclick=()=>{if(S.coins>=pk.p){S.coins-=pk.p;S.power[pk.cle]+=pk.n;sfx.piece();save();boutique();}};
    gk.appendChild(el);
  });
}

/* ---------- Barre du haut + démarrage ---------- */
document.getElementById('btn-menu').onclick=menu;
document.getElementById('btn-son').onclick=function(){SON=!SON;this.textContent=SON?'🔊':'🔇';if(SON)sfx.bon();};

/* Hook de test (jsdom) */
window.__ILE__={QUESTIONS,ILES,piocher,toutes,get S(){return S;},set S(v){S=v;}};

majEntete();
menu();
</script>
