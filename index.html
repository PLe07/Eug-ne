<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mode Combat</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #f0f0f0;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}
.container {
background: #fff;
padding: 20px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
text-align: center;
}
.bar {
width: 100%;
height: 20px;
background: #ccc;
border-radius: 10px;
margin: 10px 0;
}
.bar-fill {
height: 100%;
background: #4caf50;
border-radius: 10px;
}
.question {
font-size: 1.5em;
margin: 20px 0;
}
.buttons {
display: flex;
justify-content: space-around;
margin: 20px 0;
}
.button {
padding: 10px 20px;
font-size: 1em;
cursor: pointer;
border: none;
border-radius: 5px;
background: #007bff;
color: #fff;
transition: background 0.3s;
}
.button:hover {
background: #0056b3;
}
.timer {
font-size: 2em;
margin: 20px 0;
}
</style>
</head>
<body>
<div class="container">
<h1>Mode Combat</h1>
<div class="bar">
<div class="bar-fill" id="eugene-bar"></div>
</div>
<div class="bar">
<div class="bar-fill" id="enemy-bar"></div>
</div>
<div class="question" id="question"></div>
<div class="buttons" id="buttons"></div>
<div class="timer" id="timer"></div>
</div>

<script>
const eugeneBar = document.getElementById('eugene-bar');
const enemyBar = document.getElementById('enemy-bar');
const question = document.getElementById('question');
const buttons = document.getElementById('buttons');
const timer = document.getElementById('timer');

let eugeneHealth = 100;
let enemyHealth = 100;
let eugeneAnswered = false;
let enemyAnswered = false;
let timeLeft = 10;

function updateBars() {
eugeneBar.style.width = ${eugeneHealth}%;
enemyBar.style.width = ${enemyHealth}%;
}

function displayQuestion() {
question.textContent = "Quelle est la réponse ?"; // Remplacez par votre question
}

function displayButtons() {
buttons.innerHTML = `
<button class="button" onclick="eugeneAnswer()">Réponse 1</button>
<button class="button" onclick="enemyAnswer()">Réponse 2</button>
`;
}

function startTimer() {
let interval = setInterval(() => {
timeLeft--;
timer.textContent = Temps restant: ${timeLeft}s;
if (timeLeft <= 0) {
clearInterval(interval);
if (eugeneAnswered && enemyAnswered) {
if (eugeneAnswered && !enemyAnswered) {
alert("Eugène a gagné !");
} else {
alert("Eugène a perdu...");
}
} else if (!eugeneAnswered && enemyAnswered) {
alert("Eugène a perdu...");
}
}
if (timeLeft <= 0) {
clearInterval(interval);
if (eugeneAnswered && enemyAnswered) {
if (eugeneAnswered && !enemyAnswered) {
alert("Eugène a gagné !");
} else {
alert("Eugène a perdu...");
}
} else if (!eugeneAnswered && enemyAnswered) {
alert("Eugène a perdu...");
}
}
}, 1000);
}

function eugeneAnswer() {
eugeneAnswered = true;
enemyAnswered = true;
updateBars();
displayQuestion();
displayButtons();
startTimer();
}

function enemyAnswer() {
eugeneAnswered = true;
enemyAnswered = true;
updateBars();
displayQuestion();
displayButtons();
startTimer();
}

displayQuestion();
displayButtons();
startTimer();
</script>
</body>
</html>
